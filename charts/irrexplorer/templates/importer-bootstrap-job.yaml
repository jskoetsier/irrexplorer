{{- if and .Values.importer.enabled .Values.importer.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "irrexplorer.fullname" . }}-importer-bootstrap-{{ .Release.Revision }}
  labels:
    {{- include "irrexplorer.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.importer.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.importer.activeDeadlineSeconds }}
  template:
    metadata:
      labels:
        {{- include "irrexplorer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: importer
        app.kubernetes.io/part-of: bootstrap
    spec:
      restartPolicy: {{ .Values.importer.restartPolicy }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: importer
          image: "{{ required "goBackend.image.repository is required" .Values.goBackend.image.repository }}:{{ required "goBackend.image.tag is required" .Values.goBackend.image.tag }}"
          imagePullPolicy: {{ .Values.goBackend.image.pullPolicy }}
          command:
            - /app/importer
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: REDIS_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: JWT_SECRET_KEY
            - name: DEBUG
              value: {{ ternary "true" "false" .Values.config.debug | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.config.allowedOrigins | quote }}
            - name: IRRD_ENDPOINT
              value: {{ .Values.config.irrdEndpoint | quote }}
            - name: LOOKING_GLASS_URL
              value: {{ .Values.config.lookingGlassUrl | quote }}
            - name: BGP_SOURCE
              value: {{ .Values.config.bgpSource | quote }}
            - name: ADDITIONAL_IRR_SOURCES
              value: {{ .Values.config.additionalIrrSources | quote }}
            {{- with .Values.goBackend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.goBackend.resources | nindent 12 }}
{{- end }}
