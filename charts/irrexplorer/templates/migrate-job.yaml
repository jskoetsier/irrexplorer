{{- if .Values.migrations.enabled }}
{{- /*
  Migration ConfigMap: every .sql file under charts/irrexplorer/migrations/ is
  baked into a ConfigMap and applied in lexical order by the migrate Job.
  Migrations must be idempotent — they run on every helm upgrade.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "irrexplorer.fullname" . }}-migrations-{{ .Release.Revision }}
  labels:
    {{- include "irrexplorer.labels" . | nindent 4 }}
data:
{{- range $path, $bytes := .Files.Glob "migrations/*.sql" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "irrexplorer.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "irrexplorer.labels" . | nindent 4 }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "irrexplorer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              for f in $(ls /migrations/*.sql | sort); do
                echo "Applying $f"
                psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f "$f"
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: {{ include "irrexplorer.fullname" . }}-migrations-{{ .Release.Revision }}
{{- end }}
