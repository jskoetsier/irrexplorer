{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "irrexplorer.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "irrexplorer.labels" . | nindent 4 }}
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "irrexplorer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              psql "$DATABASE_URL" <<'SQL'
              DROP TABLE IF EXISTS bgp_alert_events CASCADE;
              DROP TABLE IF EXISTS alert_configurations CASCADE;
              DROP TABLE IF EXISTS user_monitored_asns CASCADE;
              DROP TABLE IF EXISTS user_emails CASCADE;
              DROP TABLE IF EXISTS bgp_users CASCADE;
              DROP TABLE IF EXISTS system_config CASCADE;
              SQL
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: DATABASE_URL
{{- end }}
