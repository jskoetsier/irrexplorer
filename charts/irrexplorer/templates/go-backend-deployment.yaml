{{- if .Values.goBackend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "irrexplorer.fullname" . }}-go-backend
  labels:
    {{- include "irrexplorer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.goBackend.replicaCount }}
  selector:
    matchLabels:
      {{- include "irrexplorer.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: go-backend
  template:
    metadata:
      labels:
        {{- include "irrexplorer.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: go-backend
        {{- with .Values.goBackend.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.goBackend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: go-backend
          image: "{{ required "goBackend.image.repository is required when goBackend.enabled=true" .Values.goBackend.image.repository }}:{{ required "goBackend.image.tag is required when goBackend.enabled=true" .Values.goBackend.image.tag }}"
          imagePullPolicy: {{ .Values.goBackend.image.pullPolicy }}
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "irrexplorer.fullname" . }}-app
                  key: REDIS_URL
            - name: DEBUG
              value: {{ ternary "true" "false" .Values.config.debug | quote }}
            - name: IRRD_ENDPOINT
              value: {{ .Values.config.irrdEndpoint | quote }}
            {{- with .Values.goBackend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.goBackend.resources | nindent 12 }}
      {{- with .Values.goBackend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.goBackend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.goBackend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
