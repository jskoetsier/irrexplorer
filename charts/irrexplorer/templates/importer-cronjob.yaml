{{- if .Values.importer.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "irrexplorer.fullname" . }}-importer
  labels:
    {{- include "irrexplorer.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.importer.schedule | quote }}
  concurrencyPolicy: {{ .Values.importer.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.importer.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.importer.failedJobsHistoryLimit }}
  startingDeadlineSeconds: {{ .Values.importer.startingDeadlineSeconds }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.importer.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.importer.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "irrexplorer.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: importer
        spec:
          restartPolicy: {{ .Values.importer.restartPolicy }}
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: importer
              image: "{{ required "backend.image.repository is required" .Values.backend.image.repository }}:{{ required "backend.image.tag is required" .Values.backend.image.tag }}"
              imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
              command:
                - python
                - -u
                - -m
                - irrexplorer.commands.import_data
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "irrexplorer.fullname" . }}-app
                      key: DATABASE_URL
                - name: REDIS_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "irrexplorer.fullname" . }}-app
                      key: REDIS_URL
                - name: JWT_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "irrexplorer.fullname" . }}-app
                      key: JWT_SECRET_KEY
                - name: DEBUG
                  value: {{ ternary "true" "false" .Values.config.debug | quote }}
                - name: ALLOWED_ORIGINS
                  value: {{ .Values.config.allowedOrigins | quote }}
                - name: IRRD_ENDPOINT
                  value: {{ .Values.config.irrdEndpoint | quote }}
                - name: LOOKING_GLASS_URL
                  value: {{ .Values.config.lookingGlassUrl | quote }}
                - name: BGP_SOURCE
                  value: {{ .Values.config.bgpSource | quote }}
                - name: ADDITIONAL_IRR_SOURCES
                  value: {{ .Values.config.additionalIrrSources | quote }}
                {{- with .Values.backend.extraEnv }}
                {{- toYaml . | nindent 16 }}
                {{- end }}
              resources:
                {{- toYaml .Values.backend.resources | nindent 16 }}
{{- end }}
