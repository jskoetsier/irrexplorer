nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

backend:
  replicaCount: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8000
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []
  command:
    - gunicorn
    - irrexplorer.app:app
    - --workers
    - "4"
    - --worker-class
    - uvicorn.workers.UvicornWorker
    - --bind
    - 0.0.0.0:8000
    - --timeout
    - "120"

frontend:
  replicaCount: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 80
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

goBackend:
  enabled: true
  replicaCount: 1
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  database: irrexplorer
  username: irrexplorer
  password: change-me
  storageClassName: ""
  storageSize: 10Gi
  resources: {}

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources: {}

externalDatabase:
  host: ""
  port: 5432
  database: ""
  username: ""
  password: ""

externalRedis:
  url: ""

config:
  debug: false
  allowedOrigins: ""
  irrdEndpoint: ""
  lookingGlassUrl: "https://lg.ring.nlnog.net"
  bgpSource: "https://bgp.tools/table.jsonl"
  additionalIrrSources: "RADB,ALTDB,BELL,LEVEL3,RGNET,APNIC,JPIRR,ARIN,BBOI,NTTCOM"
  jwtSecretKey: change-me

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: ""
  tls: []
  goBackendPaths:
    - /healthz
    - /go-healthz
    - /api/clean_query/
    - /api/metadata/
    - /api/prefixes/
    - /api/sets/
    - /api/datasources/
    - /api/autocomplete/
    - /api/search-history
    - /api/bookmarks
    - /api/popular
    - /api/trending
    - /api/analysis/
    - /api/filter-options
    - /api/advanced-search
    - /api/viz/

migrations:
  enabled: true

importer:
  enabled: true
  schedule: "17 */6 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  restartPolicy: OnFailure
  backoffLimit: 2
  activeDeadlineSeconds: 7200
  bootstrap:
    enabled: false
