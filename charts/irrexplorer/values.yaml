nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []


frontend:
  replicaCount: 2
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 80
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

goBackend:
  enabled: true
  replicaCount: 1
  image:
    repository: ""
    tag: ""
    pullPolicy: IfNotPresent
  service:
    port: 8080
  resources: {}
  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  extraEnv: []

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "15"
    pullPolicy: IfNotPresent
  database: irrexplorer
  username: irrexplorer
  password: change-me
  storageClassName: longhorn
  storageSize: 10Gi
  resources: {}

redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  resources: {}

externalDatabase:
  host: ""
  port: 5432
  database: ""
  username: ""
  password: ""

externalRedis:
  url: ""

config:
  debug: false
  allowedOrigins: ""
  irrdEndpoint: ""
  lookingGlassUrl: "https://lg.ring.nlnog.net"
  bgpSource: "https://bgp.tools/table.jsonl"
  additionalIrrSources: "RADB,ALTDB,BELL,LEVEL3,RGNET,APNIC,JPIRR,ARIN,BBOI,RXTXNL"
  jwtSecretKey: change-me

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: ""
  tls: []

migrations:
  enabled: true

importer:
  enabled: true
  schedule: "17 */6 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 1800
  restartPolicy: OnFailure
  backoffLimit: 2
  activeDeadlineSeconds: 7200
  bootstrap:
    enabled: false
