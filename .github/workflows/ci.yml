name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test-go:
    name: Test Go Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go-backend/go.mod
        cache-dependency-path: go-backend/go.sum

    - name: Test Go
      run: cd go-backend && go test ./...

    - name: Build Go
      run: cd go-backend && go build ./cmd/...

  code-quality-go:
    name: Go Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go-backend/go.mod
        cache-dependency-path: go-backend/go.sum

    - name: Run go vet
      run: cd go-backend && go vet ./...

  frontend:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'yarn'
        cache-dependency-path: frontend/yarn.lock

    - name: Install frontend dependencies
      working-directory: frontend
      run: yarn install --frozen-lockfile

    - name: Run ESLint
      working-directory: frontend
      run: yarn lint || true

    - name: Build frontend
      working-directory: frontend
      run: yarn build:prod

    - name: Check bundle size
      working-directory: frontend
      run: |
        du -sh build/
        du -sh build/static/js/
        du -sh build/static/css/

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-go, code-quality-go]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      continue-on-error: true
      run: |
        docker compose build

    - name: Start services
      continue-on-error: true
      run: |
        docker compose up -d
        sleep 30

    - name: Check service health
      continue-on-error: true
      run: |
        docker compose ps
        curl -f http://localhost:8080/healthz || exit 1

    - name: Check logs
      if: always()
      continue-on-error: true
      run: |
        docker compose logs go-backend

    - name: Stop services
      if: always()
      continue-on-error: true
      run: |
        docker compose down -v

  documentation:
    name: Documentation Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check documentation files
      run: |
        test -f README.md
        test -f INSTALLATION.md
        test -f DEVELOPMENT.md
        test -f DOCKER.md
        test -f CHANGELOG.md
        test -f ROADMAP.md

    - name: Validate Markdown
      uses: DavidAnson/markdownlint-cli2-action@v14
      with:
        globs: '**/*.md'
      continue-on-error: true

  build-status:
    name: Build Status Summary
    runs-on: ubuntu-latest
    needs: [test-go, code-quality-go, frontend, integration, documentation]
    if: always()

    steps:
    - name: Check build status
      run: |
        echo "Test Go: ${{ needs.test-go.result }}"
        echo "Code Quality Go: ${{ needs.code-quality-go.result }}"
        echo "Frontend: ${{ needs.frontend.result }}"
        echo "Integration: ${{ needs.integration.result }}"
        echo "Documentation: ${{ needs.documentation.result }}"
